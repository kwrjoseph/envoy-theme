{# Degree Indicators Module - from hearing-loss.html #}

{% if module.anchor_id %}
<div id="{{ module.anchor_id }}">
{% endif %}

{% if module.degrees %}
<div class="space-y-6">
  {% for degree in module.degrees %}
  <div class="flex items-center space-x-6 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center font-black text-blue-600">
      {{ degree.degree_number }}
    </div>
    <div>
      <h4 class="font-bold text-slate-900">{{ degree.degree_title }}</h4>
      <div class="text-sm text-slate-500">{{ degree.description }}</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

{% if module.anchor_id %}
</div>
{% endif %}
