<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header - Envoy Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --brand-navy: #002d74;
            --brand-grey: #53575a;
            --brand-light-blue: #f0f7ff;
            --brand-accent: #0056b3;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--brand-grey);
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        .brand-text-navy {
            color: var(--brand-navy);
        }

        .brand-bg-navy {
            background-color: var(--brand-navy);
        }

        .brand-text {
            color: var(--brand-navy);
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html"
                class="font-black text-2xl tracking-tighter brand-text-navy hover:opacity-80 transition-opacity">ENVOY
                MEDICAL</a>
            <div class="hidden md:flex items-center space-x-8 font-semibold text-[10px] uppercase tracking-widest">
                <a href="hearing-loss.html" class="hover:text-blue-600 transition-colors">HEARING LOSS</a>
                <a href="#" class="brand-text-navy">IMPLANTED OPTIONS</a>
                <a href="#" class="hover:text-blue-600 transition-colors">PATIENTS</a>
                <a href="professionals.html" class="hover:text-blue-600 transition-colors">PROFESSIONALS</a>
                <a href="#" class="hover:text-blue-600 transition-colors">COMPANY</a>
                <a href="#" class="hover:text-blue-600 transition-colors">INVESTORS</a>
            </div>
        </div>
    </nav>

    <div class="h-20"></div> <!-- Spacer for fixed nav -->

</body>

</html>
